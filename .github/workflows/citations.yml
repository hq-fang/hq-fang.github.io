name: update publication metrics

on:
  schedule:
    - cron: "0 0 * * *"   # once per day at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: jitter before API calls
        shell: bash
        run: sleep $((RANDOM % 60))

      - name: update publication YAML metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: ruby scripts/update_publication_metrics.rb

      - name: commit updated metrics
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- _data/publications; then
            echo "nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications/*.yml
          git commit -m "update publication metrics"
          git push
